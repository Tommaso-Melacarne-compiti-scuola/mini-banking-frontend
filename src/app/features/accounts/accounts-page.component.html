<section class="space-y-6">
  <div
    class="overflow-hidden rounded-4xl border border-slate-200 bg-white/90 p-6 shadow-[0_24px_120px_rgba(15,23,42,0.12)] backdrop-blur sm:p-8"
  >
    <app-page-header eyebrow="Accounts overview" title="Select an account">
      <p-button
        actions
        label="Reload accounts"
        icon="pi pi-refresh"
        [outlined]="true"
        (onClick)="reload()"
        ariaLabel="Reload account list"
        styleClass="!rounded-2xl !border-slate-300 !text-slate-700 hover:!bg-slate-50"
      />
    </app-page-header>

    <p-divider />

    @if (loading()) {
      <app-skeleton-grid />
    } @else if (error()) {
      <app-state-message tone="error" title="Unable to load accounts" [message]="error()!" />
    } @else if (hasAccounts()) {
      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
        @for (account of accounts(); track account.id) {
          <article
            class="flex h-full flex-col justify-between rounded-3xl border border-slate-200 bg-white p-0 shadow-sm"
          >
            <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
              <div>
                <h2 class="text-xl font-semibold text-slate-950">{{ accountLabel(account) }}</h2>
              </div>
              <span
                class="rounded-full bg-slate-100 px-3 py-1 text-sm font-semibold text-slate-700"
              >
                {{ account.currency }}
              </span>
            </div>

            <div class="space-y-4 px-5 py-4 text-sm text-slate-600">
              @if (account.createdAt) {
                <div class="flex items-center gap-2">
                  <i class="pi pi-calendar text-slate-400"></i>
                  <span>Created on {{ getAccountCreationDate(account) }}</span>
                </div>
              }
            </div>

            <div
              class="flex items-center justify-between gap-3 border-t border-slate-200 px-5 py-4"
            >
              <a
                pButton
                [routerLink]="['/accounts', account.id]"
                icon="pi pi-arrow-right"
                aria-label="Open account details"
                class="rounded-2xl"
              >
                Open
              </a>
            </div>
          </article>
        }
      </div>
    } @else {
      <app-state-message
        tone="empty"
        title="No accounts available"
        message="No accounts were returned by the backend."
      />
    }
  </div>
</section>
