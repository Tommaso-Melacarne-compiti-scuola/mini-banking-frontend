<section class="space-y-6">
  <div
    class="rounded-4xl border border-slate-200 bg-white/95 p-6 shadow-[0_24px_120px_rgba(15,23,42,0.12)] backdrop-blur sm:p-8"
  >
    <a
      routerLink="/accounts"
      class="inline-flex items-center gap-2 text-sm font-semibold text-cyan-700 mb-3"
    >
      <i class="pi pi-arrow-left"></i>
      Back to accounts
    </a>

    <app-page-header
      [title]="accountLabel()"
      [subtitle]="accountSubtitle()"
    >
      <p-button
        actions
        label="Deposit"
        icon="pi pi-plus"
        (onClick)="openTransactionDialog('deposit')"
        styleClass="!rounded-2xl"
      />
      <p-button
        actions
        label="Withdrawal"
        icon="pi pi-minus"
        severity="secondary"
        (onClick)="openTransactionDialog('withdrawal')"
        styleClass="!rounded-2xl"
      />
    </app-page-header>

    <p-divider />

    @if (error()) {
      <app-state-message tone="error" title="Unable to load account data" [message]="error()!" />
    }

    <div>
      <app-account-balance-card
        [balance]="balance()"
        [conversion]="conversion()"
        [conversionKind]="conversionKind()"
        [conversionSaving]="conversionSaving()"
        [balanceForm]="balanceForm"
        (convert)="convertBalance($event)"
      />
    </div>
  </div>

  <app-transaction-history-table
    [transactions]="transactions()"
    (edit)="openEditTransactionDialog($event)"
    (delete)="confirmDelete($event)"
  />
</section>

<app-transaction-dialog
  [visible]="transactionDialogVisible()"
  (visibleChange)="transactionDialogVisible.set($event)"
  [title]="transactionDialogTitle()"
  [editing]="isEditingTransaction()"
  [saving]="transactionSaving()"
  [form]="transactionForm"
  (save)="saveTransaction()"
  (dismiss)="closeTransactionDialog()"
/>

<p-confirmDialog [style]="{ width: '30rem' }" />
